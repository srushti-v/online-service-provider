{% load static %}
<html>
    <head>
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    </head>
    <body>
        <div class="container mt-3 p-3 ">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                   <div class= "card shadow-lg p-3 ">
                    <div class="card-header bg-success text-white text-center text-uppercase">
                        <h3>User-Registration</h3>
                    </div>

                    <div class="card-body">
                        <div class="mt-3 mb-3">
                            <label>Utype :</label>
                            <input type="text" name="utype" class="form-control mt-2 border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Firstname :</label>
                            <input type="text" name="firstname" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Lastname :</label>
                            <input type="text" name="lasttname" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>City :</label>
                            <select name="city" class="form-select  mt-2  border border-1 border-dark">
                                <option value="hubli">hubli</option>
                                <option value="gadag">gadag</option>
                                <option value="bangalore">bangalore</option>
                            </select>
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Profile :</label>
                            <input type="file" name="profile" class="  mt-2 form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Pincode :</label>
                            <input type="number" name="pincode" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Address :</label>
                            <textarea name="address" class="form-control  mt-2  border border-1 border-dark "></textarea>
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Email :</label>
                            <input type="email" name="email" class="form-control  mt-2 border border-1 border-dark required">
                        </div>

                         <div class="mt-3 mb-3">
                            <label>mobile_no :</label>
                            <input type="number" name="mobile_no" class="form-control  mt-2  border border-1 border-dark">
                        </div>


                        <div class="mt-3 mb-3">
                            <label>Password :</label>
                            <input type="password" name="password" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <button class=" form-input-check btn btn-success" type="submit">Create an Account</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
