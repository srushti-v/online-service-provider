{% load static %}
<html>
    <head>
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
    </head>
    <body>
        <div class="container mt-3 p-3 ">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post">
                    {% csrf_token %}
                   <div class= "card shadow-lg p-3 ">
                    <div class="card-header bg-success text-white text-center text-uppercase">
                        <h3>Ratings</h3>
                    </div>
                    <div class="card-body">
                        <div class="mt-3 mb-3">
                            <label>Services :</label>
                            <select name="service" class="form-select mt-2 border border-1 border-dark">
                                <option value="electrician">electrician</option>
                                <option value="plumber">plumber</option>
                                <option value="laundry">laundry</option>
                                <option value="crane">crane</option>
                                </select>
                        </div>
                        <div class="mt-3 mb-3">
                            <label>Booking :</label>
                            <input type="text" name="booking" class="form-control mt-2 border border-1 border-dark">
                        </div>
                        <div class="mt-3 mb-3">
                            <label>Customer-name :</label>
                            <input type="text" name="customer_name" class="form-control mt-2 border border-1 border-dark">
                        </div>
                        <div class="mt-3 mb-3">
                            <label>Ratings :</label>
                            <input type="number" name="rating" class="form-control mt-2 border border-1 border-dark">
                        </div>
                        <div class="mt-3 mb-3">
                            <label>Review:</label>
                            <input type="text" name="review" class="form-control mt-2 border border-1 border-dark">
                        </div>
                        <div class="mt-3 mb-3">
                            <label>Rated_at :</label>
                            <input type="date" name="rated_at" class="form-control mt-2 border border-1 border-dark">
                        </div>
                        <div class="mt-3 mb-3">
                            <button type="submit" class="btn btn-success ">submit</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
