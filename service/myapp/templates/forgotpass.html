{% load static %}
{% include 'header.html' %}

<body>

<hr class="border border-1 border-dark">


<div class="container d-flex justify-content-center align-items-center vh-70">
    <div class="card border-success shadow-lg" style="width: 45rem;">
        <div class="card-body">
            <h2 class="card-title text-success text-center">Forgot Password</h2>
            <p class="text-danger"> {{msg}}</p>
            <hr class="border-success">
             <form method="post">
                 {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="t1" class="form-control border border-1 border-success">
            </div>



            <div class="d-grid">
                <button class="btn btn-success">Forgot Password</button>
            </div>
             </form>

            <p class="mt-3"> <a href="{% url 'register' %}" class="mt-3"> Create An Account? </a>  </p>
            <p class="mt-3"> <a href="{% url 'forgotpass' %}" class="mt-3"> Forgot password? </a>  </p>
        </div>
    </div>
</div>


{% include 'footer.html' %}
