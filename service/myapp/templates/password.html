{% load static %}
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width , initial-scale=1">
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
    </head>
    <body>
        <div class="container mt-2 w-50 ">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="card shadow-lg p-3">
                        <div class="card-header text-center text-white bg-secondary">
                            <h3>One Time Password</h3>
                        </div>
                        <div class="card-body border border-1 border-dark mt-3 mb-3">
                            <div class="mt-3 mb-2">
                                <label>OTP :</label>
                                <input type="number" name="t1" class="form-control mt-3 border border-1 border-dark">
                            </div>
                            <div class="mt-3 mb-2 text-center">
                                <button type="submit" class="btn btn-success align-center w-100">Verify otp</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
