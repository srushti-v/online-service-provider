{% load static %}
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width , initial-scale=1">
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
    </head>
    <body>
        <div class="container mt-3  w-50">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="card shadow-lg mt-2 p-2">
                        <div class="card-header text-uppercase text-center text-white bg-secondary">
                            <h3>reset password</h3>
                        </div>
                        <div class="card-body border border-1 border-dark mt-3 mb-3">
                            <div class="mt-2 mb-3 p-2">
                                <label> new password :</label>
                                <input type="password" name="t1" class="form-control border border border-1 border-dark">
                            </div>
                            <div class="mt-2 mb-3 p-2">
                                <label>confirm password :</label>
                                <input type="password" name="t2" class="form-control border border-1 border-dark">
                            </div>
                            <div class="mb-2 mt-3 text-center">
                                <button type="submit" class="btn btn-success border border-1 border-dark w-100">Reset Password</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
