{% load static %}
{% include 'user_header.html' %}
<hr>
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0 text-white">Book Service</h4>
            <h6 class="text-warning"> {{msg}}</h6>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="service_name" class="form-label">Enter Service Name</label>
                    <input type="text" class="form-control" id="service_name" name="service_name" required>

                </div>

                <div class="mb-3">
                    <label for="service_date" class="form-label">Service Date</label>
                    <input type="date" class="form-control" id="service_date" name="service_date" required>

                </div>

                 <div class="mb-3">
                    <label for="schedule_time" class="form-label">Schedule Time</label>
                    <input type="text" class="form-control" id="schedule_time" name="schedule_time" required>

                </div>

                <div class="mb-3">
                    <label for="address" class="form-label">Communication Address</label>
                    <input type="text" class="form-control" id="address" name="address" required>

                </div>


                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" class="form-control" id="description" name="description" placeholder="eg: no of days servicer or no of hours or add proper description about the service you want">
                </div>

                <button type="submit" class="btn btn-success w-100">Book Service</button>
            </form>
        </div>
    </div>
</div>
{% include 'footer.html' %}
