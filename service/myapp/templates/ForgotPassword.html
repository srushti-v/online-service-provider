{% load static %}
<html lang="en">
<head>
   <meta charset="utf-8">
    <meta name="viewport" content="width=device-width , initial-scale=1">
    <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
    <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
</head>
<body>
     <div class="container mt-2 p-2 w-50">
         <div class="row">
             <h4 class="text-success"> {{success}}</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="card shadow-lg p-3">
                        <div class="card header text-white bg-secondary text-white text-center p-2">
                            <h3> forgot password</h3>
                        </div>
                        <div class="card body mt-3 p-2 border border-1 border-dark">
                            <div class="mt-3 mb-3 p-3 ">
                              <label>Email :</label>
                                <input type="email" name="t1" class="form-control mt-3 border border-dark required">
                            </div>
                            <div class="mt-3 mb-3 text-center">
                              <button type="submit" class="btn btn-success align-center w-100" >forgot password</button>
                            </div>
                        </div>
                    </div>
                </form>
         </div>
     </div>
</body>
</html>
