{% load static %}
<html>
    <head>
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    </head>
    <body>
        <div class="container mt-3 p-3 ">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                   <div class= "card shadow-lg p-3 ">
                    <div class="card-header bg-success text-white text-center text-uppercase">
                        <h3>Edit Profile</h3>
                    </div>

                        {% for r in data %}
                    <div class="card-body">


                        <div class="mt-3 mb-3">
                            <label>Firstname :</label>
                            <input type="text" value="{{r.firstname}}" name="firstname" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Lastname :</label>
                            <input type="text" value="{{r.lastname}}"  name="lastname" class="form-control  mt-2  border border-1 border-dark">
                        </div>




                        <div class="mt-3 mb-3">
                            <img src="/media/{{r.profile}}" style="width:100px;height:100px;">
                            <input type="file" name="profile" class="  mt-2 form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Pincode :</label>
                            <input type="number" value="{{r.pincode}}"  name="pincode" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        <div class="mt-3 mb-3">
                            <label>Address :</label>
                            <textarea name="address"  class="form-control  mt-2  border border-1 border-dark "> {{r.address}}  </textarea>
                        </div>



                         <div class="mt-3 mb-3">
                            <label>mobile_no :</label>
                            <input type="number" value="{{r.mobile_no}}"  name="mobile_no" class="form-control  mt-2  border border-1 border-dark">
                        </div>

                        {% endfor %}

                        <div class="mt-3 mb-3">
                            <button class=" form-input-check btn btn-success" type="submit">Create an Account</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
