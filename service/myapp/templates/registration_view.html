{% load static %}
<html lang="en">
<head>
    <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
    <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
</head>
<body>
<div class="container">
    <div class="row">
        <table class="table table-border table-stripped">
            <thead class=" table table-dark">
            <tr>
                <th>#</th>
                <th>utype</th>
                <th> first name</th>
                <th> last name</th>
                <th> city</th>
                <th> profile</th>
                <th> pincode</th>
                <th> address</th>
                <th>mobile_no</th>
                <th>email</th>

                <th>action</th>

            </tr>
            </thead>
            <tbody>
               {% for r in data %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{r.utype}}</td>
                <td>{{r.firstname}}</td>
                <td>{{r.lastname}}</td>
                <td>{{r.city}}</td>
                <td>{{r.profile}}</td>
                <td>{{r.pincode}}</td>
                <td>{{r.address}}</td>
                <td>{{r.mobile_no}}</td>
                <td>{{r.email}}</td>

                <td>
                    <a href="{% url 'registration_del' r.id %}" onclick="return confirm('Are You sure you want to delete this item?');">delete</a>
                </td>

                <td>
                    <a href="{% url 'registration_edit' r.id %}">edit</a>
                </td>
            </tr>
               {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
