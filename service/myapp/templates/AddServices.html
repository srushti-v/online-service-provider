{% load static %}

<html>
    <head>
        <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet" type="text/css">
        <script src="{% static 'js/bootstrap.bundle.min.js'%}"></script>
    </head>
    <body>
        <div class="container mt-3 p-3">
            <div class="row">
                <h4 class="text-success"> {{success}}</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="card shadow-lg">
                        <div class="card-header mt-3 p-3 text-center text-uppercase bg-secondary">
                            <h1>add-services</h1>
                        </div>
                        <div class="card-body">
                            
                            <div class="mt-3 p-3">
                                <label>service-choices :</label>
                                <select name="SERVICE_CHOICES" class="form-select mt-3 mb-3 border border-1 border-dark">
                                    <option value="electrician">electrician</option>
                                    <option value="plumber">plumber</option>
                                    <option value="laundry">laundry</option>
                                    <option value="crane">crane</option>
                                </select>
                            </div>

                            <div class="mt-3 mb-3">
                                <label>Provider_id :</label>
                                <input type="text" name="Provider_id" class="form-control border border-1 border-dark">
                            </div>

                            <div class="mt-3 mb-3">
                                <label>service-name :</label>
                                <input type="text" name="service_name" class="form-control border border-1 border-dark">
                            </div>

                            <div class="mt-3 mb-3">
                                <label>Service_charge :</label>
                                <input type="text" name="Service_charge" class="form-control border border-1 border-dark">
                            </div>

                            <div class="mt-2 mb-3">
                                <label>per-hour-charge</label>
                                <input type="text" name="per_hour_charge" class="form-control border border-1 border-dark">
                            </div>

                            <div class="mt-3 mb-3">
                                <label>per_day_charge</label>
                                <input type="text" name="per_day_charge" class="form-control border border-1 border-dark">
                            </div>
                            <div class="mt-3 mb-3">
                                <button type="submit" class="btn btn-success ">submit</button>
                            </div>

                        </div>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
